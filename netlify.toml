# Netlify — site estático + Functions (Admin online)

[build]
  command = "npm run build"
  publish = "."

[build.environment]
  NODE_VERSION = "20"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
  included_files = ["posts.json", "sorteios.json", "content/pages.json", "content/site.json", "content/sorteio.json", "content/guia-cultivo.json", "content/youtube-feed.json", "content/users.json", "content/user-sessions.json", "search-index.json"]

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(self), camera=(self)"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Cross-Origin-Opener-Policy = "same-origin-allow-popups"
    Cross-Origin-Resource-Policy = "same-origin"
    Content-Security-Policy = "default-src 'self'; img-src 'self' data: https://i.ytimg.com https://http2.mlstatic.com https://lh3.googleusercontent.com https://www.gstatic.com; script-src 'self' 'unsafe-inline' https://pay.google.com https://accounts.google.com/gsi/client; style-src 'self' 'unsafe-inline' https://accounts.google.com/gsi/style; connect-src 'self' https://pay.google.com https://api.stripe.com https://accounts.google.com/gsi/ https://oauth2.googleapis.com https://generativelanguage.googleapis.com; frame-src https://www.youtube-nocookie.com https://www.youtube.com https://docs.google.com https://accounts.google.com/gsi/; base-uri 'self'; form-action 'self'"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate"

[[headers]]
  for = "/version.json"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/uploads/*"
  to = "/.netlify/functions/uploads?name=:splat"
  status = 200
  force = true

[[redirects]]
  from = "/post-:slug.html"
  to = "/.netlify/functions/render-post?slug=:slug"
  status = 200
  force = true
