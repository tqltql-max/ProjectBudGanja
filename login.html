<body data-page="login">

  <div id="site-header"></div>

  <main class="conteudo-interno login-page">
    <div class="page-stack">
    <div class="login-box entrar-box">

      <h1>Área Administrativa</h1>

      <p class="login-subtitle">Entre com utilizador e senha para abrir o painel de publicações — liste, filtre e edite tudo num só lugar.</p>



      <div id="login-error" class="login-error" role="alert" hidden></div>



      <form id="login-form" class="login-form">

        <label class="login-field">

          Utilizador

          <input type="text" id="login-username" name="username" autocomplete="username" required>

        </label>

        <label class="login-field">

          Senha

          <input type="password" id="login-password" name="password" autocomplete="current-password" required>

        </label>

        <button type="submit" class="botao" id="login-submit">Entrar</button>

      </form>



      <p class="entrar-legal">Acesso restrito a administradores autorizados. Dados tratados conforme a <a href="/info/privacidade.html">política de privacidade</a>.</p>

      <p class="entrar-admin-link"><a href="/entrar.html?returnTo=/admin.html">Entrar com Google (admin autorizado)</a></p>

      <p class="entrar-admin-link"><a href="/">← Voltar ao site</a></p>

    </div>
    </div>

  </main>
