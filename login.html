<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>Login | Inspetor BudGanja</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="login">
  <div id="site-header"></div>
  <main class="conteudo-interno login-page">
    <div class="login-box">
      <h1>Área Administrativa</h1>
      <p class="login-subtitle">Entre para gerenciar pesquisas e conteúdo do site.</p>
      <div id="login-static-notice" class="login-notice" hidden>
        <p><strong>API indisponível.</strong></p>
        <p>Localmente: execute <code>npm start</code> e abra <code>http://localhost:8080/login.html</code>.</p>
        <p>No Netlify: confirme que o deploy inclui as Functions e defina <code>ADMIN_USER</code> e <code>RESEARCH_PASS</code> nas variáveis de ambiente.</p>
      </div>
      <form id="login-form" class="login-form">
        <label>Usuário<input type="text" id="username" name="username" autocomplete="username" required></label>
        <label>Senha<input type="password" id="password" name="password" autocomplete="current-password" required></label>
        <button type="submit" class="botao login-submit">Entrar</button>
        <div id="login-error" class="login-error" role="alert"></div>
      </form>
    </div>
  </main>
  <div id="site-footer"></div>
  <script src="js/layout.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
