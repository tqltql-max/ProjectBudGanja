<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <meta name="description" content="Inspetor BudGanja — site em desenvolvimento. Em breve novidades do laboratório.">
  <title>Em desenvolvimento | Inspetor BudGanja</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <script src="/js/app-version-check.js?v=207"></script>
  <script src="/js/i18n-data.js?v=207"></script>
  <script src="/js/i18n.js?v=207"></script>
  <script>(function(){var t=localStorage.getItem('budganja-theme');if(t)document.documentElement.setAttribute('data-theme',t);})();</script>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0f1410;
      --card: rgba(22, 32, 20, 0.92);
      --text: #e8f0e4;
      --muted: #9fb396;
      --accent: #27ae60;
      --accent-soft: rgba(39, 174, 96, 0.18);
      --border: rgba(143, 181, 128, 0.18);
    }
    html[data-theme="light"] {
      color-scheme: light;
      --bg: #eef3ea;
      --card: rgba(255, 255, 255, 0.94);
      --text: #1a2418;
      --muted: #5a6b54;
      --accent: #2d8f57;
      --accent-soft: rgba(45, 143, 87, 0.12);
      --border: rgba(45, 92, 39, 0.14);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: "Segoe UI", system-ui, sans-serif;
      background:
        radial-gradient(circle at 20% 10%, rgba(39, 174, 96, 0.16), transparent 42%),
        radial-gradient(circle at 80% 90%, rgba(61, 92, 40, 0.22), transparent 38%),
        var(--bg);
      color: var(--text);
    }
    .dev-shell {
      width: min(100%, 560px);
      padding: 36px 32px 28px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--card);
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.28);
      text-align: center;
    }
    .dev-brand {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
    }
    .dev-brand img {
      width: 52px;
      height: 52px;
      border-radius: 14px;
      box-shadow: 0 8px 24px rgba(39, 174, 96, 0.25);
    }
    .dev-brand span {
      font-weight: 700;
      letter-spacing: 0.02em;
    }
    .dev-badge {
      display: inline-block;
      margin: 0 0 14px;
      padding: 6px 12px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 0.82rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    h1 {
      margin: 0 0 12px;
      font-size: clamp(1.6rem, 4vw, 2rem);
      line-height: 1.15;
    }
    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.55;
      font-size: 1rem;
    }
    .dev-note {
      margin-top: 18px;
      padding-top: 18px;
      border-top: 1px solid var(--border);
      font-size: 0.92rem;
    }
    .dev-admin {
      margin-top: 22px;
    }
    .dev-admin a {
      color: var(--accent);
      font-weight: 600;
      text-decoration: none;
    }
    .dev-admin a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <main class="dev-shell">
    <div class="dev-brand" aria-hidden="true">
      <img src="/imagens/icon-192.png" alt="" width="52" height="52">
      <span>Inspetor BudGanja</span>
    </div>
    <p class="dev-badge" data-i18n="pages.dev.badge">Em construção</p>
    <h1 data-i18n="pages.dev.title">Estamos preparando novidades</h1>
    <p data-i18n="pages.dev.text">O laboratório está a montar a nova versão do site — guias, ferramentas e loja em breve.</p>
    <p class="dev-note" data-i18n="pages.dev.note">Obrigado pela paciência. Volte daqui a pouco.</p>
    <p class="dev-admin"><a href="/login.html" data-i18n="pages.dev.admin">Área administrativa</a></p>
  </main>
</body>
</html>
